name: Update Last Update Dates

permissions:
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  update-dates:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Last Update lines
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          FILES=("LLM-D_Inference_Scheduler.md" "README.md" "LLM-D_Inference_Scheduler (Short).md")
          changed=false
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              if grep -q '^Last Update:' "$f"; then
                sed -i "s/^Last Update:.*/Last Update: $DATE/" "$f"
                changed=true
              else
                # insert after first title line
                awk -v d="$DATE" 'NR==1{print; print ""; print "Last Update: " d; next} {print}' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                changed=true
              fi
            fi
          done
          if [ "$changed" = false ]; then
            echo "No files updated."
            exit 0
          fi

      - name: Commit & push if changed
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "ci: update Last Update dates"
          git push origin HEAD:${{ github.ref_name }}
